name: Validate Pages Artifact

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-artifact"
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          mkdir -p _site
          mkdir -p _site/frontend/pages
          mkdir -p _site/frontend/config
          cp index.html _site/
          cp frontend/pages/login.html _site/frontend/pages/
          cp frontend/pages/cadastro.html _site/frontend/pages/
          cp style.css _site/
          cp app.js _site/
          cp frontend/config/config.js _site/frontend/config/
          cp frontend/config/config.production.js _site/frontend/config/
          cp anotacoes/legal/license _site/license
          mkdir -p _site/assets
          cp assets/sec-logo.png _site/assets/
          cp assets/login-bg.jpg _site/assets/
          cp -r vendor _site/vendor
          touch _site/.nojekyll

      - name: Verify artifact files
        run: |
          test -f _site/index.html
          test -f _site/frontend/pages/login.html
          test -f _site/frontend/pages/cadastro.html
          test -f _site/style.css
          test -f _site/app.js
          test -f _site/frontend/config/config.production.js
          test -f _site/license
          test -f _site/assets/sec-logo.png
          test -f _site/assets/login-bg.jpg
