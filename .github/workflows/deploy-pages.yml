name: Validate Pages Artifact

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-artifact"
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp login.html _site/
          cp cadastro.html _site/
          cp style.css _site/
          cp app.js _site/
          cp config.js _site/
          cp config.production.js _site/
          cp LICENSE _site/
          mkdir -p _site/assets
          cp assets/sec-logo.png _site/assets/
          cp assets/login-bg.jpg _site/assets/
          cp -r vendor _site/vendor
          touch _site/.nojekyll

      - name: Verify artifact files
        run: |
          test -f _site/index.html
          test -f _site/login.html
          test -f _site/cadastro.html
          test -f _site/style.css
          test -f _site/app.js
          test -f _site/config.production.js
          test -f _site/assets/sec-logo.png
          test -f _site/assets/login-bg.jpg
