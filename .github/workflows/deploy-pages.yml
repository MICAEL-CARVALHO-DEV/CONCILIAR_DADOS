name: Deploy GitHub Pages (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp login.html _site/
          cp cadastro.html _site/
          if [ -f reset-senha.html ]; then cp reset-senha.html _site/; fi
          cp style.css _site/
          cp app.js _site/
          cp config.js _site/
          cp config.production.js _site/
          cp LICENSE _site/
          if [ -d assets ]; then cp -r assets _site/assets; fi
          if [ -d vendor ]; then cp -r vendor _site/vendor; fi
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
