name: Deploy Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/deploy-cloudflare-pages.yml"
      - "index.html"
      - "style.css"
      - "app.js"
      - "frontend/**"
      - "assets/**"
      - "vendor/**"
      - "scripts/build_cloudflare_dist.mjs"
      - "scripts/build_cloudflare_dist.ps1"
      - "anotacoes/legal/license"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages-production"
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: conciliar-dados

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site artifact
        run: |
          node ./scripts/build_cloudflare_dist.mjs

      - name: Verify Cloudflare artifact
        run: |
          test -f .cf-pages-dist/index.html
          test -f .cf-pages-dist/style.css
          test -f .cf-pages-dist/app.js
          test -d .cf-pages-dist/frontend
          test -d .cf-pages-dist/vendor

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .cf-pages-dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Show deployment URL
        run: echo "${{ steps.deploy.outputs.deployment-url }}"
