<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Prototipo SEC Emendas</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../style.css" />
</head>
<body class="login-page">
  <main class="login-layout">
    <section class="login-brand login-animate-left">
      <div class="login-logo-frame">
        <div class="login-logo-flip">
          <img
            src="../../assets/sec-logo.png"
            alt="Brasao do Estado da Bahia"
            class="login-logo"
            onerror="var frame=this.closest('.login-logo-frame'); if(frame){ frame.style.display='none'; } else { this.style.display='none'; }"
          />
        </div>
      </div>
      <div class="login-title-shell">
        <h1 class="login-title" aria-label="Sistema Gestao Emendas">
          <span class="login-title-line" data-text="SISTEMA" style="--line-index: 0;"><span class="login-title-line-core">SISTEMA</span></span>
          <span class="login-title-line" data-text="GESTAO" style="--line-index: 1;"><span class="login-title-line-core">GESTAO</span></span>
          <span class="login-title-line" data-text="EMENDAS" style="--line-index: 2;"><span class="login-title-line-core">EMENDAS</span></span>
        </h1>
      </div>
    </section>

    <section class="login-panel-wrap login-animate-card">
      <div class="login-panel-glass">
        <div class="login-panel">
          <h2 class="login-panel-title" data-text="Login">Login</h2>
          <form id="loginForm" class="auth-form">
            <div class="field login-field">
              <div class="login-input-wrap">
                <span class="login-input-icon" aria-hidden="true">👤</span>
                <input id="nome" autocomplete="username" placeholder="Nome de usuario ou Gmail" aria-label="Nome de usuario ou Gmail" required />
              </div>
            </div>
            <div class="field login-field">
              <div class="login-input-wrap">
                <span class="login-input-icon" aria-hidden="true">🔒</span>
                <input id="senha" type="password" autocomplete="current-password" placeholder="Senha" aria-label="Senha" required />
              </div>
            </div>
            <button type="submit" class="btn primary login-submit">Acessar</button>
          </form>

          <div id="googleAuthBlock" class="google-auth-block" hidden>
            <div class="login-divider"><span>ou</span></div>
            <div id="googleLoginButton" class="google-login-slot"></div>
          </div>

          <div class="login-links">
            <a class="btn login-link" id="linkCadastro" href="cadastro.html">Cadastrar</a>
          </div>

          <button type="button" id="btnForgotPassword" class="login-help-link muted small">Esqueceu a senha?</button>
          <p id="msg" class="login-msg muted small"></p>
          <p id="authPolicyHint" class="login-msg muted small auth-policy-hint"></p>
        </div>
      </div>
    </section>
  </main>

  <script src="../config/config.js"></script>
  <script src="../config/config.production.js"></script>
  <script>
    (async function () {
      // Mapa rapido:
      // 1) Resolve configuracao de host/API/Google
      // 2) Valida sessao existente
      // 3) Executa login local e login Google
      // 4) Registra pedido de recuperacao
      const API_BASE_URL_KEY = "SEC_API_BASE_URL";
      const CFG = (window.SEC_APP_CONFIG && typeof window.SEC_APP_CONFIG === "object") ? window.SEC_APP_CONFIG : {};
      const CFG_HOST_MAP = (CFG.API_BASE_URL_BY_HOST && typeof CFG.API_BASE_URL_BY_HOST === "object") ? CFG.API_BASE_URL_BY_HOST : {};
      const CFG_HOST_SUFFIX_MAP = (CFG.API_BASE_URL_BY_HOST_SUFFIX_MAP && typeof CFG.API_BASE_URL_BY_HOST_SUFFIX_MAP === "object")
        ? CFG.API_BASE_URL_BY_HOST_SUFFIX_MAP
        : ((CFG.API_BASE_URL_BY_HOST_SUFFIX && typeof CFG.API_BASE_URL_BY_HOST_SUFFIX === "object") ? CFG.API_BASE_URL_BY_HOST_SUFFIX : {});
      const CFG_HOST = (window.location && window.location.hostname) ? String(window.location.hostname) : "";
      const IS_LOCAL_FRONTEND = !CFG_HOST || CFG_HOST === "localhost" || CFG_HOST === "127.0.0.1";
      const CFG_GOOGLE_HOST_MAP = (CFG.GOOGLE_CLIENT_ID_BY_HOST && typeof CFG.GOOGLE_CLIENT_ID_BY_HOST === "object") ? CFG.GOOGLE_CLIENT_ID_BY_HOST : {};
      const CFG_GOOGLE_HOST_SUFFIX_MAP = (CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX_MAP && typeof CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX_MAP === "object")
        ? CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX_MAP
        : ((CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX && typeof CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX === "object") ? CFG.GOOGLE_CLIENT_ID_BY_HOST_SUFFIX : {});

      function resolveHostMappedValue(host, exactMap, suffixMap) {
        const normalizedHost = String(host || "").trim().toLowerCase();
        if (!normalizedHost) return "";
        const mapExact = (exactMap && typeof exactMap === "object") ? exactMap : {};
        const mapSuffix = (suffixMap && typeof suffixMap === "object") ? suffixMap : {};

        if (Object.prototype.hasOwnProperty.call(mapExact, normalizedHost)) {
          return String(mapExact[normalizedHost] || "");
        }

        const suffixes = Object.keys(mapSuffix).sort(function (a, b) {
          return String(b || "").length - String(a || "").length;
        });
        for (let i = 0; i < suffixes.length; i += 1) {
          const suffix = String(suffixes[i] || "").trim().toLowerCase();
          if (!suffix) continue;
          const matches = suffix.startsWith(".")
            ? normalizedHost.endsWith(suffix)
            : (normalizedHost === suffix || normalizedHost.endsWith("." + suffix));
          if (!matches) continue;
          return String(mapSuffix[suffixes[i]] || "");
        }

        return "";
      }

      const DEFAULT_API_BASE_URL = resolveHostMappedValue(CFG_HOST, CFG_HOST_MAP, CFG_HOST_SUFFIX_MAP)
        || (CFG.API_BASE_URL ? String(CFG.API_BASE_URL) : "")
        || "http://localhost:8000";
      const GOOGLE_CLIENT_ID_FROM_HOST = resolveHostMappedValue(CFG_HOST, CFG_GOOGLE_HOST_MAP, CFG_GOOGLE_HOST_SUFFIX_MAP);
      const GOOGLE_CLIENT_ID = IS_LOCAL_FRONTEND
        ? ""
        : (GOOGLE_CLIENT_ID_FROM_HOST
          ? String(GOOGLE_CLIENT_ID_FROM_HOST || "")
          : (CFG.GOOGLE_CLIENT_ID ? String(CFG.GOOGLE_CLIENT_ID) : ""));
      const SESSION_TOKEN_KEY = "SEC_SESSION_TOKEN";
      const SESSION_TOKEN_BACKUP_KEY = "SEC_SESSION_TOKEN_BKP";
      const PENDING_GOOGLE_CREDENTIAL_KEY = "SEC_PENDING_GOOGLE_CREDENTIAL";
      const USER_NAME_KEY = "SEC_USER_NAME";
      const USER_ROLE_KEY = "SEC_USER_ROLE";
      // Evita redirecionamento para URL externa/invalidada que pode causar loop de sessao.
      function sanitizeNextPath(value) {
        const raw = String(value || "").trim();
        if (!raw) return "index.html";
        if (/^[a-z]+:/i.test(raw) || raw.startsWith("//")) return "index.html";
        if (raw.indexOf("\n") >= 0 || raw.indexOf("\r") >= 0) return "index.html";
        const lower = raw.toLowerCase();
        if (lower.includes("login.html") || lower.includes("cadastro.html")) return "index.html";
        return raw.startsWith("/") ? raw.slice(1) : raw;
      }
      function getAppBasePath() {
        const pathname = (window.location && window.location.pathname) ? String(window.location.pathname) : "/";
        const normalized = pathname.replace(/\\/g, "/");
        const marker = "/frontend/pages/";
        const markerIndex = normalized.toLowerCase().indexOf(marker);
        if (markerIndex >= 0) return normalized.slice(0, markerIndex + 1);
        return normalized.replace(/[^/]*$/, "");
      }
      function resolveAppPath(path) {
        const clean = sanitizeNextPath(path);
        const base = getAppBasePath();
        return base + clean.replace(/^\/+/, "");
      }
      const query = new URLSearchParams(window.location.search);
      const next = sanitizeNextPath(query.get("next") || "index.html");
      const nextUrl = resolveAppPath(next);
      const incomingMsg = query.get("msg") || "";
      const forceClean = query.get("clean") === "1";

      function readStoredToken() {
        let token = "";
        try {
          token = String(sessionStorage.getItem(SESSION_TOKEN_KEY) || "").trim();
        } catch (_) {
          token = "";
        }
        if (token) {
          try { localStorage.setItem(SESSION_TOKEN_BACKUP_KEY, token); } catch (_) {}
          return token;
        }
        try {
          token = String(localStorage.getItem(SESSION_TOKEN_BACKUP_KEY) || "").trim();
        } catch (_) {
          token = "";
        }
        if (token) {
          try { sessionStorage.setItem(SESSION_TOKEN_KEY, token); } catch (_) {}
        }
        return token;
      }

      function writeStoredToken(token) {
        const raw = String(token || "").trim();
        if (!raw) {
          clearStoredToken();
          return;
        }
        try { sessionStorage.setItem(SESSION_TOKEN_KEY, raw); } catch (_) {}
        try { localStorage.setItem(SESSION_TOKEN_BACKUP_KEY, raw); } catch (_) {}
      }

      function clearStoredToken() {
        try { sessionStorage.removeItem(SESSION_TOKEN_KEY); } catch (_) {}
        try { localStorage.removeItem(SESSION_TOKEN_BACKUP_KEY); } catch (_) {}
      }

      // Modo "clean=1": limpa sessao/storage automaticamente sem depender do DevTools.
      if (forceClean) {
        try {
          clearStoredToken();
          sessionStorage.removeItem(PENDING_GOOGLE_CREDENTIAL_KEY);
          localStorage.removeItem(USER_NAME_KEY);
          localStorage.removeItem(USER_ROLE_KEY);
          localStorage.removeItem("SEC_API_ENABLED");
          if (IS_LOCAL_FRONTEND) {
            localStorage.setItem(API_BASE_URL_KEY, "http://127.0.0.1:8000");
          } else {
            localStorage.removeItem(API_BASE_URL_KEY);
          }
        } catch (_) {
          // Ignora falha de storage para nao quebrar o login.
        }
      }

      const form = document.getElementById("loginForm");
      const nome = document.getElementById("nome");
      const senha = document.getElementById("senha");
      const msg = document.getElementById("msg");
      const submitBtn = form.querySelector(".login-submit");
      const forgotBtn = document.getElementById("btnForgotPassword");
      const googleAuthBlock = document.getElementById("googleAuthBlock");
      const googleLoginButton = document.getElementById("googleLoginButton");
      const authPolicyHint = document.getElementById("authPolicyHint");

      const linkCadastro = document.getElementById("linkCadastro");

      linkCadastro.href = "cadastro.html?next=" + encodeURIComponent(next);
      if (incomingMsg && incomingMsg !== "Entre para continuar.") msg.textContent = incomingMsg;

      // Verifica se a URL aponta para localhost/loopback.
      function isLoopbackApiBase(value) {
        return /^https?:\/\/(?:localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])(?::\d+)?(?:\/|$)/i.test(String(value || "").trim());
      }

      function normalizeLoopbackApiBase(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        try {
          const parsed = new URL(raw);
          const host = String(parsed.hostname || "").toLowerCase();
          if (["localhost", "127.0.0.1", "0.0.0.0", "::1"].indexOf(host) < 0) return "";
          const proto = parsed.protocol === "https:" ? "https:" : "http:";
          const port = parsed.port ? ":" + parsed.port : "";
          return (proto + "//127.0.0.1" + port).replace(/\/+$/, "");
        } catch (_) {
          if (!isLoopbackApiBase(raw)) return "";
          return raw
            .replace(/^https?:\/\/(?:localhost|0\.0\.0\.0|\[::1\])/i, function (prefix) {
              return prefix.toLowerCase().startsWith("https://") ? "https://127.0.0.1" : "http://127.0.0.1";
            })
            .replace(/\/+$/, "");
        }
      }

      // Resolve URL base da API com fallback por ambiente.
      function getBaseUrl() {
        const raw = String(localStorage.getItem(API_BASE_URL_KEY) || "").trim();
        if (!IS_LOCAL_FRONTEND && raw && isLoopbackApiBase(raw)) {
          localStorage.removeItem(API_BASE_URL_KEY);
        }
        if (IS_LOCAL_FRONTEND) {
          const normalizedRaw = normalizeLoopbackApiBase(raw);
          if (raw && !normalizedRaw) {
            localStorage.removeItem(API_BASE_URL_KEY);
          }
          const localBase = normalizedRaw || normalizeLoopbackApiBase(DEFAULT_API_BASE_URL) || "http://127.0.0.1:8000";
          if (localBase && raw !== localBase) {
            try { localStorage.setItem(API_BASE_URL_KEY, localBase); } catch (_) {}
          }
          return localBase.replace(/\/+$/, "");
        }
        const base = raw || DEFAULT_API_BASE_URL;
        return base.replace(/\/+$/, "");
      }

      function readPolicyNumber(source, keys, fallbackValue) {
        const policy = source && typeof source === "object" ? source : {};
        for (let i = 0; i < keys.length; i += 1) {
          const key = String(keys[i] || "");
          const raw = Number(policy[key]);
          if (Number.isFinite(raw) && raw > 0) return raw;
        }
        return fallbackValue;
      }

      function readPolicyBoolean(source, keys, fallbackValue) {
        const policy = source && typeof source === "object" ? source : {};
        for (let i = 0; i < keys.length; i += 1) {
          const key = String(keys[i] || "");
          if (!Object.prototype.hasOwnProperty.call(policy, key)) continue;
          return !!policy[key];
        }
        return !!fallbackValue;
      }

      function friendlyAuthMessage(err, fallback) {
        if (Number(err && err.status) === 429) {
          return "Muitas tentativas de login. Aguarde alguns minutos e tente novamente.";
        }
        return err && err.message ? String(err.message) : String(fallback || "Falha na autenticacao.");
      }

      let hostedEnvironmentBlockedReason = "";

      function setHostedEnvironmentBlocked(reason) {
        hostedEnvironmentBlockedReason = String(reason || "").trim();
        clearStoredToken();
        try { localStorage.removeItem(USER_NAME_KEY); } catch (_) {}
        try { localStorage.removeItem(USER_ROLE_KEY); } catch (_) {}
        if (msg && hostedEnvironmentBlockedReason) {
          msg.textContent = hostedEnvironmentBlockedReason;
          msg.style.color = "#b4233d";
        }
        if (submitBtn) submitBtn.disabled = true;
        if (forgotBtn) forgotBtn.disabled = true;
        if (nome) nome.disabled = false;
        if (senha) senha.disabled = false;
        if (googleAuthBlock) {
          googleAuthBlock.hidden = true;
        }
      }

      function formatHealthIssueList(health) {
        const issues = [];
        if (health && health.app_env && String(health.app_env) !== "production") {
          issues.push("APP_ENV=" + String(health.app_env));
        }
        if (health && Object.prototype.hasOwnProperty.call(health, "auth_enabled") && !health.auth_enabled) {
          issues.push("auth_enabled=false");
        }
        if (health && Object.prototype.hasOwnProperty.call(health, "db_auto_bootstrap") && health.db_auto_bootstrap) {
          issues.push("db_auto_bootstrap=true");
        }
        if (health && Object.prototype.hasOwnProperty.call(health, "demo_mode") && health.demo_mode) {
          issues.push("demo_mode=true");
        }
        return issues;
      }

      async function validateHostedEnvironment() {
        if (IS_LOCAL_FRONTEND) return null;
        try {
          const resp = await fetch(getBaseUrl() + "/health");
          if (!resp.ok) return null;
          const health = await resp.json();
          const issues = formatHealthIssueList(health);
          if (!issues.length) return health;
          setHostedEnvironmentBlocked(
            "Login indisponivel no ambiente publicado. A API esta fora do contrato de producao (" + issues.join(", ") + ")."
          );
          return health;
        } catch (_) {
          return null;
        }
      }

      async function loadAuthPolicy() {
        if (!authPolicyHint) return null;
        try {
          const resp = await fetch(getBaseUrl() + "/auth/policy");
          if (!resp.ok) throw new Error("auth policy indisponivel");
          const policy = await resp.json();
          const passwordPolicy = (policy && policy.password_policy && typeof policy.password_policy === "object")
            ? policy.password_policy
            : policy;
          const lockoutPolicy = (policy && policy.login_lockout && typeof policy.login_lockout === "object")
            ? policy.login_lockout
            : policy;
          const minLength = readPolicyNumber(passwordPolicy, ["min_length", "password_min_length", "senha_min_length"], 8);
          const minimumGroups = readPolicyNumber(passwordPolicy, ["minimum_groups"], 4);
          const strongPassword = readPolicyBoolean(passwordPolicy, ["strong_password", "password_strong", "senha_forte"], minimumGroups >= 3);
          const lockMinutes = readPolicyNumber(lockoutPolicy, ["lockout_minutes", "lock_minutes", "blocked_for_minutes"], 5);
          authPolicyHint.textContent = strongPassword
            ? "Senha forte ativa (minimo " + minLength + " caracteres e " + minimumGroups + " grupos). O login local pode bloquear temporariamente e retornar 429 por cerca de " + lockMinutes + " min."
            : "Politica oficial de autenticacao carregada do backend.";
          return policy;
        } catch (_) {
          authPolicyHint.textContent = "Senha forte e bloqueio temporario seguem a politica oficial do backend.";
          return null;
        }
      }

      // Se houver token salvo, valida no backend e redireciona para a pagina alvo.
      async function validateExistingSession() {
        if (hostedEnvironmentBlockedReason) return false;
        const token = readStoredToken();
        if (!token) return false;

        try {
          const resp = await fetch(getBaseUrl() + "/auth/me", {
            method: "GET",
            headers: {
              Authorization: "Bearer " + token,
              "X-Session-Token": token
            }
          });

          if (!resp.ok) {
            throw new Error("sessao invalida");
          }

          const data = await resp.json();
          if (data && data.nome) {
            localStorage.setItem(USER_NAME_KEY, String(data.nome));
          }
          if (data && data.perfil) {
            localStorage.setItem(USER_ROLE_KEY, String(data.perfil));
          }

          window.location.href = nextUrl;
          return true;
        } catch (_) {
          clearStoredToken();
          localStorage.removeItem(USER_NAME_KEY);
          localStorage.removeItem(USER_ROLE_KEY);
          return false;
        }
      }

      await validateHostedEnvironment();
      if (await validateExistingSession()) {
        return;
      }
      loadAuthPolicy();

      // Requisicao padrao para endpoints de autenticacao.
      async function apiRequest(path, body) {
        const resp = await fetch(getBaseUrl() + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const text = await resp.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; } catch (_) {}

        if (!resp.ok) {
          const detail = json && json.detail ? json.detail : (text || ("HTTP " + resp.status));
          const err = new Error(String(detail));
          err.status = resp.status;
          err.payload = json;
          throw err;
        }
        return json;
      }

      // Carrega script externo 1 vez (Google Identity).
      async function loadExternalScript(src) {
        if (document.querySelector('script[data-ext-src="' + src + '"]')) {
          return;
        }

        await new Promise(function (resolve, reject) {
          const tag = document.createElement("script");
          tag.src = src;
          tag.async = true;
          tag.defer = true;
          tag.dataset.extSrc = src;
          tag.onload = resolve;
          tag.onerror = function () { reject(new Error("falha ao carregar script externo")); };
          document.head.appendChild(tag);
        });
      }

      // Persiste sessao no browser apos autenticacao bem sucedida.
      function persistSession(data, fallbackName, fallbackRole) {
        writeStoredToken(String(data.token || ""));
        localStorage.setItem(USER_NAME_KEY, String(data.usuario && data.usuario.nome || fallbackName || ""));
        localStorage.setItem(USER_ROLE_KEY, String(data.usuario && data.usuario.perfil || fallbackRole || "APG"));
      }

      // Controla estado visual durante chamadas async (loading/disable).
      function setBusy(isBusy, busyLabel) {
        nome.disabled = isBusy;
        senha.disabled = isBusy;
        submitBtn.disabled = isBusy;
        forgotBtn.disabled = isBusy;
        submitBtn.textContent = isBusy ? (busyLabel || "Processando...") : "Acessar";

        if (googleAuthBlock) {
          googleAuthBlock.style.pointerEvents = isBusy ? "none" : "";
          googleAuthBlock.style.opacity = isBusy ? "0.6" : "";
        }
      }

      // Callback do Google Sign-In: valida credential no backend e cria sessao.
      async function onGoogleCredential(response) {
        if (hostedEnvironmentBlockedReason) {
          msg.textContent = hostedEnvironmentBlockedReason;
          msg.style.color = "#b4233d";
          return;
        }
        const credential = String(response && response.credential || "").trim();
        if (!credential) {
          msg.textContent = "Nao foi possivel receber a credencial do Google.";
          msg.style.color = "#b4233d";
          return;
        }

        setBusy(true, "Aguardando...");
        msg.textContent = "Validando conta Google...";
        msg.style.color = "";

        try {
          const data = await apiRequest("/auth/google", { credential: credential });
          persistSession(data, (data && data.usuario && data.usuario.nome) || "Google", (data && data.usuario && data.usuario.perfil) || "APG");
          window.location.href = nextUrl;
        } catch (err) {
          if (Number(err && err.status) === 404) {
            sessionStorage.setItem(PENDING_GOOGLE_CREDENTIAL_KEY, credential);
            window.location.href = "cadastro.html?next=" + encodeURIComponent(next) + "&google=1";
            return;
          }
          msg.textContent = err && err.message ? err.message : "Falha no login com Google.";
          msg.style.color = "#b4233d";
        } finally {
          setBusy(false);
        }
      }

      // Inicializa botao Google no login (se houver client id valido).
      async function initializeGoogleAuth() {
        const clientId = String(GOOGLE_CLIENT_ID || "").trim();
        if (!clientId || !googleAuthBlock || !googleLoginButton) {
          return;
        }

        try {
          await loadExternalScript("https://accounts.google.com/gsi/client");
          if (!(window.google && window.google.accounts && window.google.accounts.id)) {
            throw new Error("google identity indisponivel");
          }

          googleAuthBlock.hidden = false;
          window.google.accounts.id.initialize({
            client_id: clientId,
            callback: onGoogleCredential,
            auto_select: false,
            cancel_on_tap_outside: true
          });
          googleLoginButton.innerHTML = "";
          window.google.accounts.id.renderButton(googleLoginButton, {
            type: "standard",
            theme: "outline",
            size: "large",
            text: "continue_with",
            shape: "pill",
            width: 320,
            logo_alignment: "left"
          });
        } catch (_err) {
          googleAuthBlock.hidden = true;
        }
      }

      initializeGoogleAuth();

      // Login local (usuario/gmail + senha).
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        if (hostedEnvironmentBlockedReason) {
          msg.textContent = hostedEnvironmentBlockedReason;
          msg.style.color = "#b4233d";
          return;
        }
        const n = String(nome.value || "").trim();
        const s = String(senha.value || "").trim();
        if (!n || !s) {
          msg.textContent = "Informe nome de usuario ou Gmail e senha.";
          msg.style.color = "#b4233d";
          return;
        }

        setBusy(true, "Entrando...");
        msg.textContent = "Autenticando...";
        msg.style.color = "";

        try {
          const data = await apiRequest("/auth/login", { nome: n, senha: s });
          persistSession(data, n, "APG");
          window.location.href = nextUrl;
        } catch (err) {
          msg.textContent = err && err.message ? err.message : "Falha no login.";
          msg.style.color = "#b4233d";
        } finally {
          setBusy(false);
        }
      });

      // Recuperacao de acesso: cria solicitacao para aprovacao de PROGRAMADOR.
      forgotBtn.addEventListener("click", async function () {
        if (hostedEnvironmentBlockedReason) {
          msg.textContent = hostedEnvironmentBlockedReason;
          msg.style.color = "#b4233d";
          return;
        }
        const identificador = String(nome.value || "").trim();
        if (!identificador) {
          msg.textContent = "Informe nome de usuario ou Gmail para recuperar o acesso.";
          msg.style.color = "#b4233d";
          nome.focus();
          return;
        }

        setBusy(true, "Aguardando...");
        msg.textContent = "Registrando solicitacao...";
        msg.style.color = "";

        try {
          const data = await apiRequest("/auth/recovery-request", { identificador: identificador });

          let displayMsg = data && data.detail ? data.detail : "Solicitacao registrada.";
          if (data && data.debug_reset_url) {
            displayMsg = `Solicitacao registrada! <br><br> <a href="${data.debug_reset_url}" style="color:#4be08e; font-weight:bold; text-decoration:underline;">CLIQUE AQUI PARA DEFINIR NOVA SENHA (SIMULACAO)</a>`;
            msg.innerHTML = displayMsg;
          } else {
            msg.textContent = displayMsg;
          }
          msg.className = "login-msg success small";
        } catch (err) {
          msg.textContent = err && err.message ? err.message : "Falha ao registrar solicitacao.";
          msg.style.color = "#b4233d";
        } finally {
          setBusy(false);
        }
      });

    })();
  </script>
</body>
</html>
